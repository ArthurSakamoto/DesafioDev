<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Encurtador de URL Corporativo</title>
    <style type="text/css">
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</h:head>

<h:body>
    <div class="card">
        <h2>🔗 Encurtador de URL Sincronizado</h2>
        <hr/><br/>

        <h:form id="shortenerForm">
            <p:messages id="messages" showDetail="true" closable="true">
                <p:autoUpdate />
            </p:messages>

            <h:panelGrid columns="1" style="width:100%;" styleClass="ui-fluid">
                <p:outputLabel for="url" value="URL Original (Destino):" style="font-weight:bold;" />
                <p:inputText id="url" value="#{urlShortenerBean.originalUrl}" required="true"
                             requiredMessage="A URL de destino é obrigatória." placeholder="https://exemplo.com/link-longo" style="margin-bottom:15px;"/>

                <p:outputLabel for="alias" value="Alias Customizado (Opcional):" style="font-weight:bold;" />
                <p:inputText id="alias" value="#{urlShortenerBean.customAlias}" placeholder="ex: promocao" style="margin-bottom:20px;"/>
            </h:panelGrid>

            <p:commandButton value="Gerar Link Encurtador" action="#{urlShortenerBean.generate}"
                             update="shortenerForm" styleClass="ui-button-success" style="width:100%; font-size:16px; padding:5px;"/>

            <h:panelGroup id="resultPanel" rendered="#{not empty urlShortenerBean.generatedUrl}">
                <div style="margin-top:25px; padding:15px; background-color:#eef9f0; border-left:5px solid #28a745;">
                    <h:outputText value="Link gerado com sucesso! Copie abaixo:" style="font-weight:bold; display:block; margin-bottom:5px; color:#1e7e34;"/>
                    <p:inputText value="#{urlShortenerBean.generatedUrl}" readonly="true" style="width:100%; font-weight:bold; text-align:center; color:#333;"/>
                    <p style="font-size:12px; color:#666; margin: 5px 0 0 0;">Abra este link em uma nova aba para testar o redirecionamento automático.</p>
                </div>
            </h:panelGroup>
        </h:form>
    </div>
</h:body>
</html>
